# CLAWD Conclave — self-hostable stack.
#
# Phase 1 doesn't actually need Docker: the relay uses local SQLite and the
# frontend runs with `yarn start`. This compose file exists for Phase 2+
# when we bring up MediaMTX (media server for the OBS stream) and, if you
# prefer, a containerized relay.
#
# Most forkers will only need the `mediamtx` service.

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "${MEDIAMTX_RTMP_PORT:-1935}:1935" # RTMP ingest (OBS pushes here)
      - "${MEDIAMTX_HLS_PORT:-8888}:8888" # HLS / LL-HLS playback
      - "${MEDIAMTX_WEBRTC_PORT:-8889}:8889" # WebRTC playback (low latency)
      - "${MEDIAMTX_API_PORT:-9997}:9997" # admin API (relay calls this)
    volumes:
      - ./infra/mediamtx.yml:/mediamtx.yml:ro

  # Optional: run the relay in a container instead of via `yarn dev`.
  # Defaults to SQLite — the `./data` directory is persisted via volume.
  # Profiles keeps this off by default so `docker compose up` doesn't try
  # to build the relay unless you ask for it.
  relay:
    profiles: [containerized]
    build:
      context: .
      dockerfile: packages/relay/Dockerfile
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      CV_API_BASE_URL: ${CV_API_BASE_URL:-https://larv.ai/api/cv}
      CV_SPEND_SECRET: ${CV_SPEND_SECRET:-}
      DATABASE_URL: /app/packages/relay/data/conclave.db
      MEDIAMTX_API_URL: http://mediamtx:9997
    volumes:
      - ./packages/relay/data:/app/packages/relay/data
    ports:
      - "${RELAY_PORT:-4000}:4000"
