server {
  listen 80;
  listen [::]:80;
  server_name conclave.larv.ai;
  # certbot --nginx will add an HTTPS block. Keep this file small and let
  # certbot own the redirect + ssl_* config.
  root /home/ubuntu/clawd-conclave/packages/nextjs/out;
  index index.html;

  # Static export uses trailingSlash:true → pages live at /path/index.html.
  try_files $uri $uri/ $uri.html $uri/index.html =404;

  location = /404.html {
    internal;
  }
}
