server {
  listen 80;
  listen [::]:80;
  server_name media.larv.ai;

  # WHEP signaling (WebRTC-HTTP Egress Protocol). MediaMTX serves WHEP
  # endpoints at /<path>/whep on :8889. Low-latency playback (~1s).
  # Media itself flows UDP directly from the viewer to MediaMTX's ICE mux
  # on port 8189 — nothing goes through nginx except the initial SDP
  # exchange and the session DELETE.
  location ~ /whep {
    proxy_pass http://127.0.0.1:8889;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    # WHEP returns a Location header pointing at a session resource; nginx
    # forwards it as-is. Preserve the ETag and other WHEP headers.
    proxy_pass_header Location;
    proxy_pass_header ETag;
  }

  # HLS fallback / default. MediaMTX LL-HLS on :8888 — keep buffering off
  # so nginx forwards parts/segments as they arrive.
  location / {
    proxy_pass http://127.0.0.1:8888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    # MediaMTX already sets CORS headers — don't stack duplicates.
  }
}
