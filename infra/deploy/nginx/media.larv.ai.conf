server {
  listen 80;
  listen [::]:80;
  server_name media.larv.ai;

  # MediaMTX HLS listener on :8888. LL-HLS playlists + tiny segments — keep
  # buffering disabled so nginx forwards chunks as they arrive.
  location / {
    proxy_pass http://127.0.0.1:8888;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    # MediaMTX already sets CORS headers — don't stack duplicates.
  }
}
