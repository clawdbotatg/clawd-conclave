# MediaMTX config for the conclave. Accepts RTMP from OBS, serves HLS and
# WebRTC to browsers. See https://github.com/bluenviron/mediamtx for the
# full reference. Intentionally minimal — the relay will push per-session
# auth + dynamic paths via the HTTP API in Phase 2.

# Admin API — the relay talks to this to mint stream keys and start/stop paths.
# Only bound to loopback so nginx / the relay talks to it but the internet can't.
api: yes
apiAddress: 127.0.0.1:9997

# Publisher auth.
# Playback (HLS/WebRTC) stays open to the world — that's the public broadcast.
# Publish (RTMP ingest) requires the creds set in .env.stream /
# MEDIAMTX_PUBLISH_USER + MEDIAMTX_PUBLISH_PASS. That way opening port 1935 to
# 0.0.0.0/0 doesn't let a random scanner grab the path out from under OBS.
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof
  - user: $MEDIAMTX_PUBLISH_USER
    pass: $MEDIAMTX_PUBLISH_PASS
    ips: []
    permissions:
      - action: publish

# RTMP ingest (OBS pushes here)
rtmp: yes
rtmpAddress: :1935

# HLS/LL-HLS for playback in any browser via hls.js
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms
hlsAllowOrigins: ["*"]

# WebRTC for ultra-low-latency playback (~1s end-to-end).
# Signaling (WHEP protocol) is HTTP on :8889 — fronted by nginx at
# https://<media host>/live/conclave/whep.
# Media itself flows UDP directly to the viewer; the EC2 security group
# MUST open UDP 8189 inbound for this to work, and WEBRTC_PUBLIC_IP must
# be set in .env.stream so MediaMTX advertises the correct ICE candidate
# (otherwise viewers try to reach the instance's internal 172.31.x.x IP
# and NAT-hole-punch fails).
webrtc: yes
webrtcAddress: :8889
webrtcICEUDPMuxAddress: :8189
webrtcAdditionalHosts:
  - $WEBRTC_PUBLIC_HOST

# Per-path config for the canonical conclave stream. runOnReady fires when
# OBS successfully publishes; yt-fanout.sh spawns an ffmpeg restream to
# YouTube when YOUTUBE_STREAM_KEY is set. runOnReadyRestart lets MediaMTX
# respawn ffmpeg if it crashes while the stream is still live.
paths:
  live/conclave:
    runOnReady: bash /home/ubuntu/clawd-conclave/infra/yt-fanout.sh
    runOnReadyRestart: yes
  all_others:
